name: Update NND View Counts

on:
  schedule:
    # Runs on the 1st and 15th of every month at 06:00 UTC
    - cron: '0 6 1,15 * *'
  workflow_dispatch: # allow manual trigger from the Actions tab

jobs:
  update-views:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch NND view counts
        run: node scripts/fetch-nnd-views.js

      - name: Commit updated views.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/views.json
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore: update NND view counts [$(date -u +%Y-%m-%d)]"

      - name: Push changes
        run: git push

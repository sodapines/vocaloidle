<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>39charts — Producer</title>
<style>
:root {
  --bg: #dedad2; --surface: #fafaf7; --sf: #f2f0eb;
  --text: #111; --muted: #555; --faint: #999;
  --line: #c8c4bc; --ls: #b8b4ac;
  --red: #cc0000; --red-dark: #990000; --link: #0066cc;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  min-height: 100%;
  font-family: "MS PGothic","Hiragino Kaku Gothic Pro","Meiryo",Arial,sans-serif;
  font-size: 12px; color: var(--text); background-color: var(--bg);
  background-image:
    linear-gradient(rgba(255,255,240,0.22) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,240,0.18) 1px, transparent 1px);
  background-size: 28px 28px, 28px 28px;
  line-height: 1.4;
}
body { min-height: 100vh; display: flex; flex-direction: column; }
a { color: var(--link); text-decoration: none; }
a:hover { text-decoration: underline; color: var(--red); }

/* ── TOP BAR ── */
.nnd-topbar {
  width: 100%; background: #111; border-bottom: 1px solid #000;
  height: 24px; display: flex; align-items: center;
  justify-content: space-between; padding: 0 10px;
  font-size: 11px; color: #777;
}

/* ── MAIN HEADER ── */
.nnd-mainbar {
  width: 100%; background: #fff; border-bottom: 2px solid var(--red);
  padding: 6px 10px; display: flex; align-items: center; gap: 16px;
}
.nnd-logo { display: flex; align-items: center; gap: 6px; text-decoration: none; color: var(--text); }
.nnd-logo:hover { text-decoration: none; }
.nnd-logo-mark {
  display: inline-flex; align-items: center; justify-content: center;
  width: 28px; height: 28px; background: var(--red); color: #fff;
  font-size: 13px; font-weight: 900; border: 1px solid var(--red-dark); flex-shrink: 0;
}
.nnd-logo-text { font-size: 15px; font-weight: 900; color: #111; letter-spacing: -0.02em; line-height: 1; }
.nnd-logo-sub  { display: block; font-size: 10px; font-weight: 400; color: var(--muted); }
.nnd-header-links { display: flex; align-items: center; gap: 6px; font-size: 12px; margin-left: auto; }
.nnd-header-links a {
  color: var(--link); display: inline-block;
  padding: 2px 8px; border: 1px solid transparent;
}
.nnd-header-links a:hover {
  text-decoration: none; color: var(--red);
  background: #f6f4ee; border-color: #fff #9a968e #9a968e #fff;
}
.nnd-header-links a:active { background: #ece9e2; border-color: #9a968e #fff #fff #9a968e; }
.nnd-divider { color: var(--line); }

/* ── BODY ── */
.nnd-body { flex: 1 0 auto; width: 100%; max-width: 1060px; margin: 0 auto; padding: 8px; }
.nnd-main { display: flex; flex-direction: column; gap: 6px; }

/* ── PRODUCER HEADER PANEL ── */
.producer-header {
  display: flex; gap: 0;
  background: var(--surface); border: 1px solid var(--line);
  border-top: 3px solid var(--red);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.75), 0 1px 2px rgba(0,0,0,0.08);
  overflow: hidden;
}
.producer-hero-art {
  position: relative; flex-shrink: 0; width: 220px;
  overflow: hidden; background: #1a1a1a;
}
.producer-hero-img {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover; filter: brightness(0.65);
}
.producer-hero-scanlines {
  position: absolute; inset: 0; pointer-events: none;
  background: repeating-linear-gradient(to bottom,
    transparent 0px, transparent 2px,
    rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 3px);
}
.producer-hero-placeholder {
  position: absolute; inset: 0; display: flex; align-items: center;
  justify-content: center; font-size: 48px; opacity: 0.15; color: #fff;
}
.producer-info {
  flex: 1; padding: 14px 16px; display: flex; flex-direction: column; gap: 8px;
  min-width: 0;
}
.producer-title-row {
  display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap;
}
.producer-title {
  font-size: 20px; font-weight: 900; color: var(--text); line-height: 1.1;
}
.producer-back-link {
  font-size: 10px; color: var(--link);
}
.producer-stats-row {
  display: flex; gap: 0; flex-wrap: wrap;
  border: 1px solid var(--line); background: var(--sf);
  width: fit-content;
}
.pstat {
  padding: 4px 12px; border-right: 1px solid var(--line); text-align: center;
}
.pstat:last-child { border-right: none; }
.pstat-val { font-size: 15px; font-weight: 900; color: var(--text); display: block; line-height: 1.2; }
.pstat-label { font-size: 9px; color: var(--faint); text-transform: uppercase; letter-spacing: 0.04em; }
.tier-badge {
  display: inline-block; padding: 0 5px;
  background: var(--red); color: #fff;
  font-size: 11px; font-weight: 700; line-height: 18px;
}
.info-row { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
.info-row-label { font-size: 9px; color: var(--faint); text-transform: uppercase; letter-spacing: 0.04em; flex-shrink: 0; margin-right: 2px; }
/* split badge: [label][count] joined */
.split-badge {
  display: inline-flex; align-items: stretch;
  border: 1px solid; font-size: 9px; font-weight: 700; line-height: 16px; overflow: hidden;
}
.split-badge .sb-label { padding: 0 5px; }
.split-badge .sb-count { padding: 0 5px; background: rgba(0,0,0,0.08); border-left: 1px solid rgba(0,0,0,0.15); font-weight: 400; color: inherit; filter: brightness(0.6); }
/* views split badge uses red label */
.split-badge-tier { border-color: #990000; }
.split-badge-tier .sb-label { background: var(--red); color: #fff; }
.split-badge-tier .sb-count { background: #f5dcdc; color: #660000; border-left-color: #bb8888; filter: none; }
/* views placeholder panel */
.views-placeholder {
  background: var(--surface); border: 1px solid var(--line);
  border-top: 3px solid var(--line);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.75), 0 1px 2px rgba(0,0,0,0.08);
  overflow: hidden;
}
.views-placeholder-header {
  background: linear-gradient(to bottom,#f0f0f0,#e0e0e0);
  border-bottom: 1px solid var(--line);
  padding: 4px 10px; font-size: 12px; font-weight: 700; color: var(--muted);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.8);
  display: flex; align-items: center; gap: 6px; justify-content: space-between;
}
.views-placeholder-body {
  padding: 16px 14px; display: flex; flex-direction: column; align-items: center;
  gap: 6px; min-height: 80px; justify-content: center;
}
.placeholder-chart {
  display: flex; align-items: flex-end; gap: 3px; height: 40px;
}
.placeholder-bar {
  width: 14px; background: var(--line); border-radius: 1px 1px 0 0;
  opacity: 0.5;
}
.placeholder-note { font-size: 10px; color: var(--faint); text-align: center; }
.vtag {
  display: inline-block; padding: 0 4px;
  font-size: 9px; line-height: 14px; border: 1px solid; font-weight: 700;
}
.vtag-miku   { background: #e0f4f8; border-color: #39c5bb; color: #007a73; }
.vtag-rin    { background: #fff4d0; border-color: #f5a623; color: #915800; }
.vtag-len    { background: #fffacc; border-color: #d4b800; color: #7a6500; }
.vtag-luka   { background: #fce4ec; border-color: #e91e8c; color: #9c0060; }
.vtag-gumi   { background: #e8f5e9; border-color: #43a047; color: #1b5e20; }
.vtag-ia     { background: #f3e5f5; border-color: #9c27b0; color: #6a1b9a; }
.vtag-kaito  { background: #e8eaf6; border-color: #3949ab; color: #1a237e; }
.vtag-meiko  { background: #fce8e6; border-color: #e53935; color: #b71c1c; }
.vtag-teto   { background: #fde8ec; border-color: #d44466; color: #8c1030; }
.vtag-flower { background: #f0e4f8; border-color: #9040a0; color: #581070; }
.vtag-kafu   { background: #d8f0f8; border-color: #2096b8; color: #005878; }
.vtag-una    { background: #fdf0d0; border-color: #e08000; color: #7a4000; }
.vtag-yuki   { background: #fff8d0; border-color: #b09000; color: #5a4800; }
.vtag-rei    { background: #fce0f0; border-color: #cc3080; color: #880050; }
.vtag-defoko { background: #e0e8f0; border-color: #6080a0; color: #304060; }
.vtag-other  { background: var(--sf); border-color: var(--ls); color: var(--muted); }

/* ── DISCOGRAPHY SECTION HEADER ── */
.section-header {
  display: flex; align-items: center; gap: 8px; padding: 4px 6px;
  background: var(--sf); border: 1px solid var(--line);
  border-top: 3px solid var(--red);
}
.section-title { font-size: 13px; font-weight: 900; color: var(--text); }
.section-count { font-size: 10px; color: var(--faint); }
.sort-switch { display: flex; border: 1px solid var(--ls); margin-left: auto; }
.sort-btn {
  min-height: 22px; height: 22px; padding: 0 9px;
  color: var(--muted); background: linear-gradient(to bottom,#fff,#e8e8e8);
  border: none; border-right: 1px solid var(--ls); font-size: 10px; font-weight: 400;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.8); cursor: pointer;
}
.sort-btn:last-child { border-right: none; }
.sort-btn:hover { background: linear-gradient(to bottom,#fff5f5,#ffd0d0); color: var(--red); }
.sort-btn.is-active { background: var(--red); color: #fff; font-weight: 700; }

/* ── SONG GRID ── */
.song-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 5px;
}

/* ── SONG CARD ── */
.song-card {
  background: var(--surface); border: 1px solid var(--line);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.8), 0 1px 2px rgba(0,0,0,0.08);
  display: flex; flex-direction: column; overflow: hidden;
}
.song-card:hover { border-color: var(--ls); box-shadow: inset 0 1px 0 rgba(255,255,255,0.8), 0 2px 5px rgba(0,0,0,0.13); }
.card-thumb {
  position: relative; width: 100%; aspect-ratio: 16/9;
  overflow: hidden; background: #1a1a1a; flex-shrink: 0;
}
.card-thumb img {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover; display: block; z-index: 1;
}
.thumb-link {
  position: absolute; inset: 0; z-index: 3;
}
.card-rank {
  position: absolute; top: 3px; left: 3px; z-index: 4;
  padding: 0 4px; background: rgba(0,0,0,0.72); color: #e8e0d0;
  font-size: 9px; font-weight: 900; line-height: 15px; letter-spacing: 0.02em;
}
.card-scanlines {
  position: absolute; inset: 0; z-index: 2; pointer-events: none;
  background: repeating-linear-gradient(to bottom,
    transparent 0px, transparent 2px,
    rgba(0,0,0,0.05) 2px, rgba(0,0,0,0.05) 3px);
}
.card-tier {
  position: absolute; bottom: 3px; right: 3px; z-index: 4;
  padding: 0 4px; background: var(--red); color: #fff;
  font-size: 9px; font-weight: 700; line-height: 14px;
}
.card-body { padding: 5px 6px 3px; flex: 1 0 auto; display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.card-title {
  font-size: 11px; font-weight: 700; color: var(--text);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; line-height: 1.3;
}
.card-title a { color: inherit; }
.card-title a:hover { color: var(--red); text-decoration: none; }
.card-vocalist { font-size: 10px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.card-vocals { display: flex; gap: 2px; flex-wrap: wrap; padding: 2px 6px 5px; }

/* ── STATE ── */
.state-message {
  grid-column: 1 / -1; padding: 32px; text-align: center;
  color: var(--faint); font-size: 12px;
  background: var(--surface); border: 1px solid var(--line);
}
.state-message strong { display: block; margin-bottom: 4px; color: var(--muted); font-size: 13px; }

/* ── FOOTER ── */
.site-footer {
  flex-shrink: 0; width: 100%; background: #e0e0e0;
  border-top: 1px solid var(--ls); padding: 5px 10px;
  font-size: 11px; color: var(--faint); text-align: center;
}
.site-footer a { color: var(--link); font-size: 11px; }
.site-footer a:hover { text-decoration: underline; }

@media (max-width: 860px) { .song-grid { grid-template-columns: repeat(2, 1fr); } .producer-hero-art { width: 160px; } }
@media (max-width: 600px) { .producer-header { flex-direction: column; } .producer-hero-art { width: 100%; height: 140px; } }
@media (max-width: 480px) { .song-grid { grid-template-columns: 1fr; } }
@media (min-width: 861px) and (max-width: 1080px) { .song-grid { grid-template-columns: repeat(3, 1fr); } }

/* ════════ VISUAL POLISH PASS ════════ */
.song-grid { gap: 6px; }
.song-card { transition: transform .12s ease, box-shadow .12s ease, border-color .12s ease; }
.song-card:hover { transform: translateY(-2px); border-color: var(--red); box-shadow: inset 0 1px 0 rgba(255,255,255,0.85), 0 4px 11px rgba(0,0,0,0.20); }
.card-thumb img { transition: transform .28s ease; }
.song-card:hover .card-thumb img { transform: scale(1.06); }

/* Real view ribbon on cards (full numbers) */
.card-views {
  position: absolute; bottom: 0; right: 0; z-index: 4;
  display: flex; align-items: baseline; gap: 3px;
  padding: 1px 5px;
  background: linear-gradient(to top, rgba(130,0,0,0.92), rgba(150,0,0,0.74));
  color: #fff; font-family: Consolas, "MS Gothic", monospace;
  border-top: 1px solid rgba(255,255,255,0.12); border-left: 1px solid rgba(255,255,255,0.12);
}
.card-views .cv-num { font-size: 10px; font-weight: 700; }
.card-views .cv-label { font-size: 8px; opacity: .75; text-transform: uppercase; letter-spacing: .04em; }

/* Real "Total Views" panel + top-songs chart (replaces the mock) */
.views-panel {
  background: var(--surface); border: 1px solid var(--line); border-top: 3px solid var(--red);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.75), 0 1px 2px rgba(0,0,0,0.08); overflow: hidden;
}
.views-panel-header {
  background: linear-gradient(to bottom, #f5f3ee, #ece9e2);
  border-bottom: 1px solid var(--line);
  padding: 4px 10px; font-size: 12px; font-weight: 900; color: var(--text);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.8);
  display: flex; align-items: center; justify-content: space-between;
}
.vp-asof { font-size: 9px; font-weight: 400; color: var(--faint); }
.views-panel-body { padding: 12px 14px; display: flex; align-items: center; gap: 18px; flex-wrap: wrap; }
.vp-figure { display: flex; flex-direction: column; gap: 2px; flex-shrink: 0; }
.vp-total-label { font-size: 9px; color: var(--faint); text-transform: uppercase; letter-spacing: 0.04em; }
.vp-total {
  font-family: Consolas, "MS Gothic", monospace; font-size: 18px; font-weight: 900;
  color: var(--red); line-height: 1.05; text-shadow: 0 1px 0 rgba(255,255,255,0.8);
}
.vp-sub { font-size: 10px; color: var(--muted); }
.vp-chart {
  flex: 1; min-width: 160px; display: flex; align-items: flex-end; gap: 3px; height: 48px;
  padding: 4px 6px; background: var(--sf); border: 1px solid var(--line);
  box-shadow: inset 0 1px 2px rgba(0,0,0,0.06);
}
.vp-chart.placeholder .placeholder-bar {
  flex: 1; width: auto; background: var(--line); opacity: 0.5; border-radius: 1px 1px 0 0;
}

/* Discography sort: gradient active state */
.sort-btn.is-active { background: linear-gradient(to bottom, var(--red), var(--red-dark)); box-shadow: inset 0 1px 0 rgba(255,255,255,0.28); }
.eyebrow { background: linear-gradient(to bottom, var(--red), var(--red-dark)); border: 1px solid var(--red-dark); box-shadow: inset 0 1px 0 rgba(255,255,255,0.3); }
</style>
</head>

<div class="nnd-mainbar">

<script>
/* ── Cache ── */
function loadSongs() {
  const KEY = "39c_songs_v2";
  try { const c = sessionStorage.getItem(KEY); if(c) return Promise.resolve(JSON.parse(c)); } catch(e) {}
  return fetch("../data/songs.json")
    .then(r=>{ if(!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
    .then(data=>{ try { sessionStorage.setItem(KEY,JSON.stringify(data)); } catch(e) {} return data; });
}

const VOCALIST_MAP = [
  { key:"miku",   label:"Miku",   match:/hatsune miku/i,       cls:"vtag-miku"   },
  { key:"rin",    label:"Rin",    match:/kagamine rin/i,        cls:"vtag-rin"    },
  { key:"len",    label:"Len",    match:/kagamine len/i,        cls:"vtag-len"    },
  { key:"luka",   label:"Luka",   match:/megurine luka/i,       cls:"vtag-luka"   },
  { key:"gumi",   label:"GUMI",   match:/\bgumi\b|megpoid/i,    cls:"vtag-gumi"   },
  { key:"ia",     label:"IA",     match:/^ia$|^ia :/i,          cls:"vtag-ia"     },
  { key:"kaito",  label:"KAITO",  match:/\bkaito\b/i,           cls:"vtag-kaito"  },
  { key:"meiko",  label:"MEIKO",  match:/\bmeiko\b/i,           cls:"vtag-meiko"  },
  { key:"teto",   label:"Teto",   match:/kasane teto/i,         cls:"vtag-teto"   },
  { key:"flower", label:"flower", match:/\bflower\b|v flower/i, cls:"vtag-flower" },
  { key:"kafu",   label:"KAFU",   match:/\bkafu\b/i,            cls:"vtag-kafu"   },
  { key:"una",    label:"Una",    match:/otomachi una/i,         cls:"vtag-una"    },
  { key:"yuki",   label:"Yuki",   match:/kaai yuki/i,           cls:"vtag-yuki"   },
  { key:"rei",    label:"Rei",    match:/adachi rei/i,           cls:"vtag-rei"    },
  { key:"defoko", label:"Defoko", match:/utane uta|defoko/i,    cls:"vtag-defoko" },
];

const VIEW_TIERS = [
  {tag:"100m",label:"100M+",score:6},{tag:"10m",label:"10M+",score:5},
  {tag:"1m",  label:"1M+",  score:4},{tag:"100k",label:"100K+",score:3},
  {tag:"10k", label:"10K+", score:2},
];

function tierScore(song) {
  const tags = song.sourceTags||[];
  for (const t of VIEW_TIERS)
    if (tags.some(tag=>tag.endsWith("-"+t.tag)||tag===t.tag)) return t;
  return {label:null,score:0};
}

/* ── Real NicoNico view counts ── */
let VIEWS = {};
let VIEWS_UPDATED = null;
let YT_STATS = {};
function nndViews(song){ const v=VIEWS[String(song.vocadbId)]; return typeof v==="number"?v:null; }
function ytViews(song){ const s=YT_STATS[String(song.vocadbId)]; return s&&typeof s.views==="number"?s.views:null; }
// Producer totals combine NicoNico + YouTube.
function getViewCount(song){ const n=nndViews(song),y=ytViews(song); return (n==null&&y==null)?null:(n||0)+(y||0); }
function formatViews(n){ if(n>=1e9)return (n/1e9).toFixed(n>=1e10?1:2).replace(/\.?0+$/,"")+"B"; if(n>=1e6)return (n/1e6).toFixed(n>=1e7?1:2).replace(/\.?0+$/,"")+"M"; if(n>=1e3)return Math.round(n/1e3)+"K"; return String(n); }
function loadViews(){
  const KEY="39c_views_v2";
  try{ const c=sessionStorage.getItem(KEY); if(c) return Promise.resolve(JSON.parse(c)); }catch(e){}
  return fetch("../data/views.json").then(r=>r.ok?r.json():null)
    .then(d=>{ if(d){ try{sessionStorage.setItem(KEY,JSON.stringify(d));}catch(e){} } return d; })
    .catch(()=>null);
}
function loadYtViews(){
  const KEY="39c_ytviews_v2";
  try{ const c=sessionStorage.getItem(KEY); if(c) return Promise.resolve(JSON.parse(c)); }catch(e){}
  return fetch("../data/ytviews.json").then(r=>r.ok?r.json():null)
    .then(d=>{ if(d){ try{sessionStorage.setItem(KEY,JSON.stringify(d));}catch(e){} } return d; })
    .catch(()=>null);
}

function coverArtChain(song) {
  const all = [...(song.coverArts||[])];
  if (song.coverArt && !all.includes(song.coverArt)) all.unshift(song.coverArt);
  const ytHq = song.ytOriginalId ? `https://i.ytimg.com/vi/${song.ytOriginalId}/hqdefault.jpg` : null;
  if (ytHq) { all.push(ytHq, `https://i.ytimg.com/vi/${song.ytOriginalId}/mqdefault.jpg`); }
  const nndNum = song.nndOriginalId ? String(song.nndOriginalId).match(/(\d+)/)?.[1] : null;
  if (nndNum) all.push(`https://nicovideo.cdn.nimg.jp/thumbnails/${nndNum}/${nndNum}`);
  const p = u => (ytHq&&u===ytHq)?-1:u.includes("ytimg.com")&&u.includes("hqdefault")?0:u.includes("ytimg.com")&&u.includes("mqdefault")?1:u.includes("ytimg.com")?2:u.includes("sndcdn.com")?3:4;
  return [...new Set(all)].sort((a,b)=>p(a)-p(b));
}

function advanceThumb(img, skipYt) {
  let rest = JSON.parse(img.dataset.srcs||"[]");
  if (skipYt) rest = rest.filter(u=>!u.includes("ytimg.com"));
  if (rest.length) { img.src=rest[0]; img.dataset.srcs=JSON.stringify(rest.slice(1)); }
  else img.remove();
}
function tryNextSrc(img) { advanceThumb(img, false); }
function thumbOnload(img) {
  if (img.naturalWidth && img.naturalWidth<=120 && img.naturalHeight<=90 && /ytimg\.com/.test(img.currentSrc||img.src)) advanceThumb(img, true);
}

function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function normalizeVocalists(singerNames, artistString) {
  const singers = singerNames||[];
  const found = [];
  const seenKeys = new Set();
  singers.forEach(name => {
    if (!name || /various/i.test(name)) return;
    const v = VOCALIST_MAP.find(v=>v.match.test(name));
    if (v) { if(!seenKeys.has(v.key)){seenKeys.add(v.key);found.push(v);} }
    else {
      const key = name.toLowerCase();
      if (!seenKeys.has(key)) { seenKeys.add(key); found.push({key,label:name.split(" ")[0],cls:"vtag-other"}); }
    }
  });
  if (found.length===0 && /various/i.test(artistString||""))
    found.push({key:"various",label:"Various",cls:"vtag-other"});
  return found;
}

function vocalistCounts(songs) {
  const counts = {};
  songs.forEach(s => {
    const vs = normalizeVocalists(s.singerNames, s.artistString);
    vs.forEach(v => { counts[v.key] = (counts[v.key]||{v,n:0}); counts[v.key].n++; });
  });
  return Object.values(counts).sort((a,b)=>b.n-a.n);
}

let ALL_SONGS = [];
let activeSort = "views";

function byViews(a, b) {
  const av=getViewCount(a), bv=getViewCount(b);
  if (av!=null || bv!=null) {
    if (av==null) return 1;
    if (bv==null) return -1;
    if (bv!==av) return bv-av;
  }
  return tierScore(b).score-tierScore(a).score || (b.publishDate||"").localeCompare(a.publishDate||"");
}

function getSorted() {
  const s = [...ALL_SONGS];
  if (activeSort === "date") s.sort((a,b)=>(b.publishDate||"").localeCompare(a.publishDate||""));
  else if (activeSort === "title") s.sort((a,b)=>a.title.localeCompare(b.title));
  else s.sort(byViews);
  return s;
}

function buildCard(song, rank) {
  const chain = coverArtChain(song);
  const tier  = tierScore(song);
  const vocals = normalizeVocalists(song.singerNames, song.artistString);
  const link  = `song.html?id=${song.vocadbId}`;
  const imgHtml = chain.length
    ? `<img src="${escHtml(chain[0])}" alt="" loading="lazy" data-srcs="${escHtml(JSON.stringify(chain.slice(1)))}" onload="thumbOnload(this)" onerror="tryNextSrc(this)">`
    : "";
  const count = getViewCount(song);
  const nv = nndViews(song), yv = ytViews(song);
  const bd = [nv!=null?`NicoNico ${nv.toLocaleString()}`:null, yv!=null?`YouTube ${yv.toLocaleString()}`:null].filter(Boolean).join("  ·  ");
  const tierHtml = count != null
    ? `<span class="card-views" title="${bd}"><span class="cv-num">${count.toLocaleString()}</span><span class="cv-label">views</span></span>`
    : (tier.label ? `<span class="card-tier">${escHtml(tier.label)}</span>` : "");
  const vocHtml = vocals.length
    ? vocals.map(v=>`<span class="vtag ${v.cls}">${escHtml(v.label)}</span>`).join("")
    : "";
  return `
    <div class="song-card">
      <div class="card-thumb">
        ${imgHtml}
        <a href="${link}" class="thumb-link" aria-label="${escHtml(song.title)}" tabindex="-1"></a>
        <span class="card-rank">#${rank}</span>
        <div class="card-scanlines"></div>
        ${tierHtml}
      </div>
      <div class="card-body">
        <div class="card-title"><a href="${link}">${escHtml(song.title)}</a></div>
        <div class="card-vocalist">${escHtml(song.publishDate ? song.publishDate.slice(0,4) : "")}</div>
      </div>
      ${vocHtml ? `<div class="card-vocals">${vocHtml}</div>` : ""}
    </div>`;
}

function renderGrid() {
  const sorted = getSorted();
  const grid = document.getElementById("song-grid");
  if (!grid) return;
  document.getElementById("disc-count").textContent = `${sorted.length} song${sorted.length!==1?"s":""}`;
  grid.innerHTML = sorted.map((s,i) => buildCard(s,i+1)).join("");
}

function buildPage(producerName, songs) {
  document.title = `39charts — ${producerName}`;
  document.getElementById("topbar-crumb").textContent = `39charts › Producers › ${producerName}`;

  ALL_SONGS = songs;

  // Stats
  const topTier = songs.reduce((best,s)=>{
    const t=tierScore(s); return t.score>best.score?t:best;
  },{score:0,label:null});
  const years = songs.map(s=>s.publishDate?parseInt(s.publishDate.slice(0,4)):null).filter(Boolean);
  const yearRange = years.length ? (Math.min(...years)===Math.max(...years)?String(Math.min(...years)):`${Math.min(...years)}–${Math.max(...years)}`) : "—";
  // Real-view totals
  const counted = songs.filter(s=>getViewCount(s)!=null);
  const totalViews = counted.reduce((sum,s)=>sum+getViewCount(s),0);
  const topByViews = [...counted].sort((a,b)=>getViewCount(b)-getViewCount(a));
  const maxV = topByViews.length ? getViewCount(topByViews[0]) : 0;

  const topSong = topByViews[0] || songs.slice().sort((a,b)=>tierScore(b).score-tierScore(a).score)[0];
  const chain = topSong ? coverArtChain(topSong) : [];

  // Vocalist split badges
  const vcounts = vocalistCounts(songs);
  const vocPills = vcounts.slice(0,8).map(({v,n})=>
    `<span class="split-badge ${v.cls}" style="border-color:currentColor"><span class="sb-label">${escHtml(v.label)}</span><span class="sb-count">${n}</span></span>`
  ).join("");

  // Tier distribution split badges
  const tierDist = VIEW_TIERS.map(t=>{
    const n = songs.filter(s=>tierScore(s).label===t.label).length;
    return n ? `<span class="split-badge split-badge-tier"><span class="sb-label">${escHtml(t.label)}</span><span class="sb-count">${n}</span></span>` : "";
  }).filter(Boolean).join("");

  // Placeholder "over time" chart bars — live history isn't collected yet
  const mockBars = [34,52,40,66,48,78,58,44,62,36,72,50,60,42,68,46].map(h=>
    `<div class="placeholder-bar" style="height:${h}%"></div>`).join("");

  const main = document.getElementById("main-content");
  main.innerHTML = `
    <div class="producer-header">
      <div class="producer-hero-art">
        ${chain.length ? `<img class="producer-hero-img" src="${escHtml(chain[0])}" alt="" data-srcs="${escHtml(JSON.stringify(chain.slice(1)))}" onload="thumbOnload(this)" onerror="tryNextSrc(this)">` : ""}
        <div class="producer-hero-scanlines"></div>
        <div class="producer-hero-placeholder">♪</div>
      </div>
      <div class="producer-info">
        <div class="producer-title-row">
          <div class="producer-title">${escHtml(producerName)}</div>
          <a class="producer-back-link" href="producers.html">&#9664; All Producers</a>
        </div>
        <div class="producer-stats-row">
          <div class="pstat">
            <span class="pstat-val">${songs.length}</span>
            <span class="pstat-label">Songs</span>
          </div>
          <div class="pstat">
            <span class="pstat-val" style="color:var(--red)"${totalViews?` title="${totalViews.toLocaleString()} views (NicoNico + YouTube)"`:""}>${totalViews ? formatViews(totalViews) : "—"}</span>
            <span class="pstat-label">Total Views</span>
          </div>
          <div class="pstat">
            <span class="pstat-val">${topTier.label ? `<span class="tier-badge">${escHtml(topTier.label)}</span>` : "—"}</span>
            <span class="pstat-label">Top Tier</span>
          </div>
          <div class="pstat">
            <span class="pstat-val">${escHtml(yearRange)}</span>
            <span class="pstat-label">Active</span>
          </div>
        </div>
        ${vocPills ? `<div class="info-row"><span class="info-row-label">Vocalists</span>${vocPills}</div>` : ""}
        ${tierDist ? `<div class="info-row"><span class="info-row-label">View Tiers</span>${tierDist}</div>` : ""}
      </div>
    </div>

    <div class="views-panel">
      <div class="views-panel-header">
        <span>Total Views Over Time</span>
        <span class="vp-asof">Live view history coming soon</span>
      </div>
      <div class="views-panel-body">
        <div class="vp-figure">
          <div class="vp-total-label">Total views &middot; NicoNico + YouTube${VIEWS_UPDATED ? ` &middot; as of ${escHtml(VIEWS_UPDATED)}` : ""}</div>
          <div class="vp-total"${totalViews?` title="${totalViews.toLocaleString()} views"`:""}>${totalViews ? totalViews.toLocaleString() : "—"}</div>
          <div class="vp-sub">${counted.length} of ${songs.length} songs counted${topSong && totalViews ? ` &middot; top: <a href="song.html?id=${topSong.vocadbId}">${escHtml(topSong.title)}</a>` : ""}</div>
        </div>
        <div class="vp-chart placeholder" aria-hidden="true">${mockBars}</div>
      </div>
    </div>

    <div class="section-header">
      <span class="section-title">Discography</span>
      <span class="section-count" id="disc-count"></span>
      <div class="sort-switch">
        <button class="sort-btn is-active" data-sort="views">Views</button>
        <button class="sort-btn" data-sort="date">Newest</button>
        <button class="sort-btn" data-sort="title">A–Z</button>
      </div>
    </div>

    <div class="song-grid" id="song-grid"></div>`;

  document.querySelectorAll(".sort-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".sort-btn").forEach(b=>b.classList.remove("is-active"));
      btn.classList.add("is-active");
      activeSort = btn.dataset.sort;
      renderGrid();
    });
  });

  renderGrid();
}

/* ── Bootstrap ── */
const params = new URLSearchParams(location.search);
const producerName = (params.get("name")||"").trim();

if (!producerName) {
  document.getElementById("main-content").innerHTML =
    `<div class="state-message"><strong>No producer specified</strong><a href="producers.html">Browse all producers</a></div>`;
} else {
  Promise.all([loadSongs(), loadViews(), loadYtViews()])
    .then(([data, views, ytviews]) => {
      if (views && views.views) { VIEWS = views.views; VIEWS_UPDATED = views.updated || null; }
      if (ytviews && ytviews.stats) { YT_STATS = ytviews.stats; }
      const songs = data.filter(s => s.artist === producerName);
      if (songs.length === 0) {
        document.getElementById("main-content").innerHTML =
          `<div class="state-message"><strong>Producer not found</strong>"${escHtml(producerName)}" was not found in the dataset. <a href="producers.html">Browse all producers</a></div>`;
        return;
      }
      buildPage(producerName, songs);
    })
    .catch(err => {
      document.getElementById("main-content").innerHTML =
        `<div class="state-message"><strong>Could not load songs.json</strong>${escHtml(err.message)}</div>`;
    });
}
</script>
